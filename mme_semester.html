<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful Boxes with Buttons</title>
    <!-- Link to external CSS file -->
    <link rel="stylesheet" href="semester.css">
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7812693991042173"
    crossorigin="anonymous"></script>

<style>
        /* ══ RESPONSIVE ══ */
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .header-box { font-size: 16px; padding: 12px; }
        }
        @media (max-width: 600px) {
            .btn {
                width: calc(50% - 10px) !important;
                min-width: 130px;
                display: inline-block;
                margin: 5px !important;
                padding: 12px 6px !important;
                font-size: 13px !important;
                text-align: center;
                min-height: 50px;
                box-sizing: border-box;
            }
        }
        @media (max-width: 360px) {
            .btn { width: 100% !important; }
        }
        @media (hover: none) and (pointer: coarse) { .btn { min-height: 52px; } }
        /* ══ END RESPONSIVE ══ */
</style>
</head>
<body>

    <!-- Header box with heading -->
    <div class="header-box">
        SELECT SEMESTER
    </div>

    <div class="container">
        <!-- First Row -->
        <div class="box">
            <a href="calculator.html?key=mme_e1s1" class="btn">E-01 SEM-01</a>
            <a href="calculator.html?key=mme_e1s2" class="btn">E-01 SEM-02</a>
        </div>

        <!-- Second Row -->
        <div class="box">

        </div>

        <!-- Third Row -->
        <div class="box">

        </div>

        <!-- Fourth Row -->
        <div class="box">
            <a href="calculator.html?key=mme_e4s1" class="btn">E-04 SEM-01</a>
            <a href="calculator.html?key=mme_e4s2" class="btn">E-04 SEM-02</a>
        </div>
    </div>

</body>
</html>
